name: Debug Session (2 Hours)
on:
  workflow_dispatch: # Allows you to start this manually

jobs:
  tunnel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Start Zuul App in Background
        run: |
          ./gradlew :zuul-simple-webapp:bootRun \
            -x licenseFormat -x licenseCheck -x licenseMain -x licenseTest &
          echo "Waiting for app to start..."
          sleep 30 # Give the app a moment to initialize

      - name: Start Pinggy Tunnel
        run: |
          # This starts the tunnel and logs the URL to the console
          ssh -p 443 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 \
            -R0:localhost:8080 free.pinggy.io > pinggy_url.txt 2>&1 &
          
          # Give it a second to generate the URL, then print it
          sleep 5
          grep -o 'https://[^ ]*' pinggy_url.txt || echo "Check the logs below for the URL"
          cat pinggy_url.txt

      - name: Keep Alive for 2 Hours
        run: |
          echo "The tunnel is active. Access it using the URL above."
          echo "This job will automatically close in 2 hours."
          sleep 7200
