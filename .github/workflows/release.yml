name: Debug Session (2 Hours)
on:
  workflow_dispatch: # Allows you to start this manually

jobs:
  tunnel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Start Zuul App in Background
        run: |
          # Run bootRun and redirect all output to a file so we can debug later
          ./gradlew :zuul-simple-webapp:bootRun \
            -x licenseFormat -x licenseCheck -x licenseMain -x licenseTest > app_logs.txt 2>&1 &
          
          echo "Waiting for Zuul to bind to port 8080..."
          # Loop for up to 5 minutes checking if port 8080 is active
          for i in {1..30}; do
            if nc -z localhost 8080; then
              echo "Zuul is UP on port 8080!"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 10
          done
          echo "ERROR: Zuul failed to start in time. Check app_logs.txt"
          cat app_logs.txt
          exit 1

      - name: Start Pinggy Tunnel
        run: |
          # Start the tunnel and log output
          ssh -p 443 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 \
            -R0:localhost:8080 free.pinggy.io > pinggy_output.txt 2>&1 &
          
          sleep 10
          echo "--- TUNNEL URL ---"
          grep -o 'https://[^ ]*' pinggy_output.txt || echo "URL not found in logs"
          cat pinggy_output.txt
          echo "------------------"

          

      - name: Keep Alive for 2 Hours
        run: |
          echo "The tunnel is active. Access it using the URL above."
          echo "This job will automatically close in 2 hours."
          sleep 7200
