version: '3.8'

services:
  zuul:
    build:
      context: ..
      dockerfile: zuul-docker/Dockerfile
    ports:
      - "7001:7001"
      - "7008:7008"
    environment:
      - archaius.deployment.environment=test
    depends_on:
      - backend

  backend:
    image: python:3.9-slim
    volumes:
      - ./mock-backend:/app
    working_dir: /app
    command: python mock_backend.py
    ports:
      - "8080:8080"
